# ══════════════════════════════════════════════════════════════
#  Development overrides — use com:
#    docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#  ou simplesmente:
#    make dev
# ══════════════════════════════════════════════════════════════

services:

  backend:
    build:
      target: runtime
    volumes:
      - ./backend:/app              # hot reload do código Python
      - backend_data:/app/data
    command: >
      sh -c "aerich upgrade &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DEBUG: "true"
      LOG_FORMAT: "console"
      LOG_LEVEL: "DEBUG"
    ports:
      - "8000:8000"                 # Expõe backend diretamente em dev

  frontend:
    volumes:
      - ./frontend:/usr/share/nginx/html    # monta arquivos estáticos ao vivo
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
