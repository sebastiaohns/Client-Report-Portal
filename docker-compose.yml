services:

  # ════════════════════════════════════════════
  #  BACKEND — FastAPI
  # ════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: finplan_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY:   ${SECRET_KEY}
    volumes:
      - backend_data:/app/data          # SQLite persistence
    expose:
      - "8000"                          # Internal only — nginx proxies externally
    networks:
      - finplan_net
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ════════════════════════════════════════════
  #  FRONTEND — nginx serving static files
  #            + reverse proxy to backend
  # ════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    container_name: finplan_frontend
    restart: unless-stopped
    environment:
      API_URL:     ${API_URL:-/api/v1}
      APP_NAME:    ${APP_NAME:-FinPlan}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    ports:
      - "80:80"                         # Only port exposed to the host
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finplan_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ════════════════════════════════════════════
  #  DATABASE — PostgreSQL (optional)
  #  Uncomment to use PostgreSQL instead of SQLite.
  #  Update DATABASE_URL in .env to:
  #    postgres://finplan:finplan_pass@db:5432/finplan_db
  # ════════════════════════════════════════════
  # db:
  #   image: postgres:16-alpine
  #   container_name: finplan_db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER:     finplan
  #     POSTGRES_PASSWORD: finplan_pass
  #     POSTGRES_DB:       finplan_db
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   expose:
  #     - "5432"
  #   networks:
  #     - finplan_net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U finplan"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

networks:
  finplan_net:
    driver: bridge

volumes:
  backend_data:
  # postgres_data:   # uncomment together with the db service